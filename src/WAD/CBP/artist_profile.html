<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Artist Profile</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="navbar">
    <div class="logo">✨ GlamConnect</div>
    <div class="nav-center">
        <a href="events.html">Book Now</a>
        <a href="artist_dashboard.html">Dashboard</a>
    </div>
    <div class="nav-right">
        <span class="user-badge">👤 <span id="artistTopName"></span></span>
        <button onclick="logoutUser()">⎋</button>
    </div>
</div>

<div class="dashboard-container">
    <div class="sidebar">
        <div class="profile-card">
            <div class="avatar">🎨</div>
            <h3 id="artistNameCard"></h3>
            <p>Professional Artist</p>
        </div>

        <ul class="menu">
            <li onclick="goToArtistDashboard()">🏠 Dashboard</li>
            <li onclick="goToArtistRequests()">📩 Booking Requests</li>
            <li onclick="goToArtistConfirmed()">✅ Confirmed</li>
            <li onclick="goToArtistAvailability()">🗓️ Availability</li>
            <li onclick="goToArtistServices()">💄 Services & Pricing</li>
            <li onclick="goToArtistReviews()">⭐ Reviews</li>
            <li onclick="goToArtistEarnings()">💰 Earnings</li>
            <li class="active" onclick="goToArtistProfile()">👤 Profile</li>
        </ul>
    </div>

    <div class="dashboard-content">
        <h1>Profile <span style="color:#d63384">Settings</span></h1>

        <div class="artist-profile-form">
            <label>Full Name</label>
            <input type="text" value="Priya Sharma">

            <label>Studio Name</label>
            <input type="text" value="Glamour Studio">

            <label>Email</label>
            <input type="email" value="s1@gmail.com">

            <label>Phone</label>
            <input type="text" value="+91 98765 43210">

            <label>City</label>
            <input type="text" value="Hyderabad">

            <label>Bio</label>
            <textarea>Professional makeup artist with 8+ years of experience.</textarea>

            <button class="save-btn-artist">Save Changes ✨</button>
        </div>
    </div>
</div>

<script>
let artistName = localStorage.getItem("username") || "Priya Sharma";
document.getElementById("artistTopName").innerText = artistName;
document.getElementById("artistNameCard").innerText = artistName;
</script>
<script src="script.js"></script>
</body>
</html>
