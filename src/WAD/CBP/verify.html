<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify OTP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="left">
        <h1>Verify OTP</h1>
        <p class="subtitle">Check your email and enter the OTP</p>
    </div>

    <div class="right">
        <div class="login-box">

            <h2>Enter OTP</h2>

            <form onsubmit="return verifyOTP()">

                <label>OTP</label>
                <input type="text" id="otpInput" placeholder="Enter OTP" required>

                <button class="login-btn">Verify</button>

            </form>
            <button onclick="goToLogin()" class="login-btn" style="margin-top:10px; background:#888;">
    Back to Login
</button>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
