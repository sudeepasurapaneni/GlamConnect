!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Availability</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="navbar">
    <div class="logo">✨ GlamConnect</div>
    <div class="nav-center">
        <a href="events.html">Book Now</a>
        <a href="artist_dashboard.html">Dashboard</a>
    </div>
    <div class="nav-right">
        <span class="user-badge">👤 <span id="artistTopName"></span></span>
        <button onclick="logoutUser()">⎋</button>
    </div>
</div>

<div class="dashboard-container">
    <div class="sidebar">
        <div class="profile-card">
            <div class="avatar">🎨</div>
            <h3 id="artistNameCard"></h3>
            <p>Professional Artist</p>
        </div>

        <ul class="menu">
            <li onclick="goToArtistDashboard()">🏠 Dashboard</li>
            <li onclick="goToArtistRequests()">📩 Booking Requests</li>
            <li onclick="goToArtistConfirmed()">✅ Confirmed</li>
            <li class="active" onclick="goToArtistAvailability()">🗓️ Availability</li>
            <li onclick="goToArtistServices()">💄 Services & Pricing</li>
            <li onclick="goToArtistReviews()">⭐ Reviews</li>
            <li onclick="goToArtistEarnings()">💰 Earnings</li>
            <li onclick="goToArtistProfile()">👤 Profile</li>
        </ul>
    </div>

    <div class="dashboard-content">
        <h1>Manage <span style="color:#d63384">Availability</span></h1>

        <div class="availability-box">
            <p>Select dates to block/unblock</p>
            <input type="date">
            <button class="block-btn">Block Date</button>
            <button class="unblock-btn">Unblock Date</button>
        </div>
    </div>
</div>

<script>
let artistName = localStorage.getItem("username") || "Priya Sharma";
document.getElementById("artistTopName").innerText = artistName;
document.getElementById("artistNameCard").innerText = artistName;
</script>
<script src="script.js"></script>
</body>
</html>
