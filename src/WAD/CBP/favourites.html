<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Favorites</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <div class="logo">✨ GlamConnect</div>
    <div class="nav-center">
        <a href="events.html">Book Now</a>
        <a href="user_dashboard.html">Dashboard</a>
    </div>
    <div class="nav-right">
        <span class="user-badge">👤 <span id="username"></span></span>
        <button onclick="logoutUser()">⎋</button>
    </div>
</div>

<div class="dashboard-container">
    <div class="sidebar">
        <div class="profile-card">
            <div class="avatar">👩</div>
            <h3 id="userNameCard"></h3>
            <p id="userEmail">s1@gamil.com</p>
        </div>

        <ul class="menu">
            <li onclick="goToUserDashboard()">🏠 Dashboard</li>
            <li onclick="goToBookings()">📋 My Bookings</li>
            <li onclick="goToPastBookings()">📜 Past Bookings</li>
            <li class="active" onclick="goToFavorites()">❤️ Favorites</li>
            <li onclick="goToReviews()">⭐ Reviews</li>
            <li onclick="goToNotifications()">🔔 Notifications</li>
            <li onclick="goToProfile()">👤 Profile</li>
        </ul>
    </div>

    <div class="dashboard-content">
        <h1 class="page-title">Saved <span>Artists</span> ❤️</h1>

        <div class="saved-list">
            <div class="saved-artist-card">
                <div class="saved-artist-left">
                    <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=300" alt="Priya Sharma">
                    <div>
                        <h2>Priya Sharma</h2>
                        <p>Glamour Studio</p>
                    </div>
                </div>
                <button class="heart-btn">❤️</button>
            </div>

            <div class="saved-artist-card">
                <div class="saved-artist-left">
                    <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=300" alt="Kavya Iyer">
                    <div>
                        <h2>Kavya Iyer</h2>
                        <p>Aura Beauty Bar</p>
                    </div>
                </div>
                <button class="heart-btn">❤️</button>
            </div>
        </div>
    </div>
</div>

<script>
    let name = localStorage.getItem("username") || "Rahul Kumar";
    document.getElementById("username").innerText = name;
    document.getElementById("userNameCard").innerText = name;
</script>
<script src="script.js"></script>
</body>
</html>
